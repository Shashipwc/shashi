###############################################################################
# FULLY AUTOMATED OIC-to-OIC INTEGRATION MIGRATION
#
# - No manual inputs required
# - Discovers all integrations in source OIC automatically
# - Exports each integration as .iar
# - Imports each integration into target OIC
# - Validates every step with clear error messages
# - Handles conflicts, retries, and edge cases
#
# Triggers: push to main, scheduled nightly, or manual
###############################################################################

name: "OIC Auto-Migration (Source → Target)"

on:
  push:
    branches: [main]
    paths:
      - "config/migration-config.json"
  schedule:
    # Run every day at 2:00 AM UTC (adjust as needed)
    - cron: "0 2 * * *"
  workflow_dispatch: {}

concurrency:
  group: oic-auto-migration
  cancel-in-progress: false

env:
  API_TIMEOUT: 120
  MAX_RETRIES: 3
  RETRY_DELAY: 15
  EXPORT_DIR: "oic_exports"

jobs:
  ##############################################################################
  # JOB 1: VALIDATE ENVIRONMENT & CONNECTIVITY
  ##############################################################################
  validate-environment:
    name: "1 ─ Validate Environment"
    runs-on: ubuntu-latest
    outputs:
      source_url: ${{ steps.urls.outputs.source_url }}
      target_url: ${{ steps.urls.outputs.target_url }}

    steps:
      # ── Check all secrets exist ──
      - name: "Check: All required secrets are configured"
        run: |
          echo "=========================================="
          echo "  CHECKING REQUIRED SECRETS"
          echo "=========================================="
          FAIL=false

          check_secret() {
            local name="\$1"
            local value="\$2"
            if [ -z "$value" ]; then
              echo "::error::❌ Secret '$name' is NOT configured."
              FAIL=true
            else
              echo "  ✅ $name is set"
            fi
          }

          check_secret "SOURCE_OIC_HOST"     "${{ secrets.SOURCE_OIC_HOST }}"
          check_secret "SOURCE_OIC_USERNAME"  "${{ secrets.SOURCE_OIC_USERNAME }}"
          check_secret "SOURCE_OIC_PASSWORD"  "${{ secrets.SOURCE_OIC_PASSWORD }}"
          check_secret "TARGET_OIC_HOST"      "${{ secrets.TARGET_OIC_HOST }}"
          check_secret "TARGET_OIC_USERNAME"  "${{ secrets.TARGET_OIC_USERNAME }}"
          check_secret "TARGET_OIC_PASSWORD"  "${{ secrets.TARGET_OIC_PASSWORD }}"

          if [ "$FAIL" = true ]; then
            echo ""
            echo "::error::One or more required secrets are missing. Go to Settings → Secrets and variables → Actions to add them."
            exit 1
          fi
          echo ""
          echo "✅ All secrets present."

      # ── Build base URLs ──
      - name: "Build OIC REST API base URLs"
        id: urls
        run: |
          build_url() {
            local host="\$1"
            host="${host%/}"
            [[ "$$host" != https://* ]] && host="https://$$host"
            echo "${host}/ic/api/integration/v1"
          }

          SOURCE_URL=$$(build_url "$${{ secrets.SOURCE_OIC_HOST }}")
          TARGET_URL=$$(build_url "$${{ secrets.TARGET_OIC_HOST }}")

          echo "Source API: $SOURCE_URL"
          echo "Target API: $TARGET_URL"

          echo "source_url=$$SOURCE_URL" >> "$$GITHUB_OUTPUT"
          echo "target_url=$$TARGET_URL" >> "$$GITHUB_OUTPUT"

      # ── Test Source connectivity ──
      - name: "Check: Source OIC connectivity & authentication"
        run: |
          echo "=========================================="
          echo "  TESTING SOURCE OIC"
          echo "=========================================="
          URL="${{ steps.urls.outputs.source_url }}/integrations?limit=1"

          for i in $$(seq 1 $$MAX_RETRIES); do
            HTTP=$(curl -s -o /tmp/src.json -w "%{http_code}" \
              --max-time $API_TIMEOUT \
              -u "$${{ secrets.SOURCE_OIC_USERNAME }}:$${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/json" "$URL" 2>/tmp/src_err.txt)
            EC=$?

            [ $EC -ne 0 ] && {
              echo "::warning::Curl error (attempt $$i): $$(cat /tmp/src_err.txt)"
              [ $$i -lt $$MAX_RETRIES ] && sleep $RETRY_DELAY && continue
              echo "::error::❌ Cannot reach Source OIC after $MAX_RETRIES attempts. Check SOURCE_OIC_HOST, network/firewall, and DNS."
              exit 1
            }

            case "$HTTP" in
              200) echo "✅ Source OIC reachable, credentials valid."; break ;;
              401) echo "::error::❌ Source OIC returned 401 Unauthorized. Check SOURCE_OIC_USERNAME / SOURCE_OIC_PASSWORD."; exit 1 ;;
              403) echo "::error::❌ Source OIC returned 403 Forbidden. User lacks REST API access."; exit 1 ;;
              404) echo "::error::❌ Source OIC returned 404. Verify SOURCE_OIC_HOST points to a valid OIC instance."; exit 1 ;;
              500|502|503|504)
                echo "::warning::Source OIC returned $$HTTP (attempt $$i)."
                [ $$i -lt $$MAX_RETRIES ] && sleep $RETRY_DELAY && continue
                echo "::error::❌ Source OIC server error ($$HTTP) after $$MAX_RETRIES attempts."
                exit 1 ;;
              *) echo "::error::❌ Unexpected HTTP $HTTP from Source OIC."; cat /tmp/src.json; exit 1 ;;
            esac
          done

      # ── Test Target connectivity ──
      - name: "Check: Target OIC connectivity & authentication"
        run: |
          echo "=========================================="
          echo "  TESTING TARGET OIC"
          echo "=========================================="
          URL="${{ steps.urls.outputs.target_url }}/integrations?limit=1"

          for i in $$(seq 1 $$MAX_RETRIES); do
            HTTP=$(curl -s -o /tmp/tgt.json -w "%{http_code}" \
              --max-time $API_TIMEOUT \
              -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" "$URL" 2>/tmp/tgt_err.txt)
            EC=$?

            [ $EC -ne 0 ] && {
              echo "::warning::Curl error (attempt $$i): $$(cat /tmp/tgt_err.txt)"
              [ $$i -lt $$MAX_RETRIES ] && sleep $RETRY_DELAY && continue
              echo "::error::❌ Cannot reach Target OIC after $MAX_RETRIES attempts. Check TARGET_OIC_HOST, network/firewall, and DNS."
              exit 1
            }

            case "$HTTP" in
              200) echo "✅ Target OIC reachable, credentials valid."; break ;;
              401) echo "::error::❌ Target OIC returned 401 Unauthorized. Check TARGET_OIC_USERNAME / TARGET_OIC_PASSWORD."; exit 1 ;;
              403) echo "::error::❌ Target OIC returned 403 Forbidden. User lacks REST API access."; exit 1 ;;
              404) echo "::error::❌ Target OIC returned 404. Verify TARGET_OIC_HOST."; exit 1 ;;
              500|502|503|504)
                echo "::warning::Target OIC returned $$HTTP (attempt $$i)."
                [ $$i -lt $$MAX_RETRIES ] && sleep $RETRY_DELAY && continue
                echo "::error::❌ Target OIC server error ($$HTTP) after $$MAX_RETRIES attempts."
                exit 1 ;;
              *) echo "::error::❌ Unexpected HTTP $HTTP from Target OIC."; cat /tmp/tgt.json; exit 1 ;;
            esac
          done

  ##############################################################################
  # JOB 2: DISCOVER ALL INTEGRATIONS IN SOURCE
  ##############################################################################
  discover-integrations:
    name: "2 ─ Discover Source Integrations"
    runs-on: ubuntu-latest
    needs: validate-environment
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      count: ${{ steps.build-matrix.outputs.count }}

    steps:
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: "Fetch all integrations from Source OIC"
        id: build-matrix
        run: |
          echo "=========================================="
          echo "  DISCOVERING INTEGRATIONS IN SOURCE OIC"
          echo "=========================================="

          SOURCE_URL="${{ needs.validate-environment.outputs.source_url }}"
          ALL_INTEGRATIONS="[]"
          OFFSET=0
          LIMIT=100
          HAS_MORE=true
          PAGE=1

          while [ "$HAS_MORE" = "true" ]; do
            echo "Fetching page $$PAGE (offset=$$OFFSET, limit=$LIMIT)..."

            HTTP=$(curl -s -o /tmp/page.json -w "%{http_code}" \
              --max-time ${{ env.API_TIMEOUT }} \
              -u "$${{ secrets.SOURCE_OIC_USERNAME }}:$${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/json" \
              "$${SOURCE_URL}/integrations?limit=$${LIMIT}&offset=${OFFSET}" 2>/tmp/page_err.txt)

            EC=$?

            if [ $EC -ne 0 ]; then
              echo "::error::❌ Curl failed fetching integrations (page $$PAGE). Error: $$(cat /tmp/page_err.txt)"
              exit 1
            fi

            if [ "$HTTP" != "200" ]; then
              echo "::error::❌ Failed to list integrations (HTTP $$HTTP, page $$PAGE)."
              cat /tmp/page.json 2>/dev/null
              exit 1
            fi

            # Validate JSON
            if ! jq empty /tmp/page.json 2>/dev/null; then
              echo "::error::❌ Invalid JSON response on page $PAGE."
              head -c 500 /tmp/page.json
              exit 1
            fi

            # Extract items
            ITEMS=$(jq -r '.items // []' /tmp/page.json)
            ITEM_COUNT=$$(echo "$$ITEMS" | jq 'length')

            echo "  Page $$PAGE: found $$ITEM_COUNT integrations"

            # Build entries: { id, version, name, status }
            PAGE_ENTRIES=$$(echo "$$ITEMS" | jq '[.[] | {
              id: (.id // .code // .identifier),
              version: .version,
              name: (.name // "unknown"),
              status: (.status // "UNKNOWN")
            }]')

            ALL_INTEGRATIONS=$$(echo "$$ALL_INTEGRATIONS" "$PAGE_ENTRIES" | jq -s '.[0] + .[1]')

            # Check if more pages
            if [ "$$ITEM_COUNT" -lt "$$LIMIT" ]; then
              HAS_MORE=false
            else
              OFFSET=$((OFFSET + LIMIT))
              PAGE=$((PAGE + 1))
            fi
          done

          TOTAL=$$(echo "$$ALL_INTEGRATIONS" | jq 'length')
          echo ""
          echo "=========================================="
          echo "  TOTAL INTEGRATIONS FOUND: $TOTAL"
          echo "=========================================="

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::❌ No integrations found in Source OIC. Nothing to migrate."
            exit 1
          fi

          # List all discovered integrations
          echo ""
          echo "$ALL_INTEGRATIONS" | jq -r '.[] | "  [\(.status)] \(.id) v\(.version)  —  \(.name)"'
          echo ""

          # Build matrix JSON for the next job
          MATRIX=$$(echo "$$ALL_INTEGRATIONS" | jq -c '{include: .}')

          echo "count=$$TOTAL" >> "$$GITHUB_OUTPUT"
          echo "matrix=$$MATRIX" >> "$$GITHUB_OUTPUT"

  ##############################################################################
  # JOB 3: EXPORT → IMPORT EACH INTEGRATION (parallel matrix)
  ##############################################################################
  migrate-integration:
    name: "3 ─ Migrate: $${{ matrix.id }} v$${{ matrix.version }}"
    runs-on: ubuntu-latest
    needs: [validate-environment, discover-integrations]
    strategy:
      matrix: ${{ fromJson(needs.discover-integrations.outputs.matrix) }}
      fail-fast: false     # Don't stop other migrations if one fails
      max-parallel: 3      # Limit parallel API calls to avoid throttling

    steps:
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl file

      # ── STEP A: Validate this integration in source ──
      - name: "Validate: $${{ matrix.id }} v$${{ matrix.version }} exists in source"
        id: validate-source
        run: |
          echo "=========================================="
          echo "  VALIDATE SOURCE: $${{ matrix.id }} v$${{ matrix.version }}"
          echo "=========================================="

          SOURCE_URL="${{ needs.validate-environment.outputs.source_url }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"

          HTTP=$(curl -s -o /tmp/val_src.json -w "%{http_code}" \
            --max-time ${{ env.API_TIMEOUT }} \
            -u "$${{ secrets.SOURCE_OIC_USERNAME }}:$${{ secrets.SOURCE_OIC_PASSWORD }}" \
            -H "Accept: application/json" \
            "$${SOURCE_URL}/integrations/$${ENCODED}")

          case "$HTTP" in
            200)
              echo "✅ Integration confirmed in source."
              SRC_STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/val_src.json)
              SRC_PATTERN=$(jq -r '.pattern // "UNKNOWN"' /tmp/val_src.json)
              echo "  Status:  $SRC_STATUS"
              echo "  Pattern: $SRC_PATTERN"
              echo "source_status=$$SRC_STATUS" >> "$$GITHUB_OUTPUT"
              ;;
            404)
              echo "::error::❌ [${{ matrix.id }}] Integration NOT FOUND in source. It may have been deleted after discovery."
              exit 1
              ;;
            401)
              echo "::error::❌ [${{ matrix.id }}] Authentication failure (401) when validating in source."
              exit 1
              ;;
            *)
              echo "::error::❌ [$${{ matrix.id }}] Unexpected HTTP $$HTTP when validating source."
              cat /tmp/val_src.json 2>/dev/null
              exit 1
              ;;
          esac

      # ── STEP B: Export .iar from source ──
      - name: "Export: $${{ matrix.id }} v$${{ matrix.version }}"
        id: export
        run: |
          echo "=========================================="
          echo "  EXPORT: $${{ matrix.id }} v$${{ matrix.version }}"
          echo "=========================================="

          SOURCE_URL="${{ needs.validate-environment.outputs.source_url }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"

          mkdir -p ${{ env.EXPORT_DIR }}
          FILE="$${{ env.EXPORT_DIR }}/$${INT_ID}_${INT_VER}.iar"

          SUCCESS=false
          for i in $$(seq 1 $${{ env.MAX_RETRIES }}); do
            echo "  Export attempt $$i/$${{ env.MAX_RETRIES }}..."

            HTTP=$$(curl -s -o "$$FILE" -w "%{http_code}" \
              --max-time 300 \
              -u "$${{ secrets.SOURCE_OIC_USERNAME }}:$${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/octet-stream" \
              "$${SOURCE_URL}/integrations/$${ENCODED}/archive" 2>/tmp/exp_err.txt)
            EC=$?

            if [ $EC -ne 0 ]; then
              echo "::warning::[$${{ matrix.id }}] Curl error (attempt $$i): $(cat /tmp/exp_err.txt)"
              [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep ${{ env.RETRY_DELAY }} && continue
              echo "::error::❌ [$${{ matrix.id }}] Export failed — network/curl error after $${{ env.MAX_RETRIES }} attempts."
              exit 1
            fi

            case "$HTTP" in
              200)
                SUCCESS=true
                echo "  ✅ Export HTTP 200."
                break
                ;;
              401)
                echo "::error::❌ [${{ matrix.id }}] Export failed — 401 Unauthorized."
                exit 1
                ;;
              403)
                echo "::error::❌ [${{ matrix.id }}] Export failed — 403 Forbidden. User lacks export permission."
                exit 1
                ;;
              404)
                echo "::error::❌ [${{ matrix.id }}] Export failed — 404 Not Found."
                exit 1
                ;;
              409)
                echo "::warning::[${{ matrix.id }}] Export conflict (409). Retrying..."
                [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep ${{ env.RETRY_DELAY }} && continue
                echo "::error::❌ [$${{ matrix.id }}] Export conflict not resolved after $${{ env.MAX_RETRIES }} attempts."
                exit 1
                ;;
              500|502|503|504)
                echo "::warning::[$${{ matrix.id }}] Export server error ($$HTTP, attempt $i)."
                [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep $(( RETRY_DELAY * i )) && continue
                echo "::error::❌ [$${{ matrix.id }}] Export server error after $${{ env.MAX_RETRIES }} attempts."
                exit 1
                ;;
              *)
                echo "::error::❌ [$${{ matrix.id }}] Export unexpected HTTP $$HTTP."
                # If response is text, it's an error body
                file "$$FILE" | grep -qi text && cat "$$FILE"
                exit 1
                ;;
            esac
          done

          [ "$$SUCCESS" != "true" ] && { echo "::error::❌ [$${{ matrix.id }}] Export failed."; exit 1; }
          echo "export_file=$$FILE" >> "$$GITHUB_OUTPUT"

      # ── STEP C: Validate the exported .iar ──
      - name: "Validate export: ${{ matrix.id }}"
        run: |
          echo "=========================================="
          echo "  VALIDATE EXPORT FILE"
          echo "=========================================="

          FILE="${{ steps.export.outputs.export_file }}"

          # File exists?
          if [ ! -f "$FILE" ]; then
            echo "::error::❌ [$${{ matrix.id }}] Export file missing at $$FILE."
            exit 1
          fi

          # File size
          SIZE=$$(stat -c%s "$$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          echo "  File size: $SIZE bytes"

          if [ "$SIZE" -lt 100 ]; then
            echo "::error::❌ [$${{ matrix.id }}] Export file too small ($$SIZE bytes). Likely an error response:"
            cat "$FILE"
            exit 1
          fi

          # File type — must be a ZIP archive, not text/JSON/HTML
          TYPE=$$(file "$$FILE")
          echo "  File type: $TYPE"

          if echo "$TYPE" | grep -qiE "text|json|xml|html"; then
            echo "::error::❌ [${{ matrix.id }}] Export file is text, not a binary archive. Content:"
            head -c 500 "$FILE"
            exit 1
          fi

          if echo "$TYPE" | grep -qiE "zip|archive|jar|octet"; then
            echo "  ✅ File is a valid archive."
          else
            echo "::warning::[${{ matrix.id }}] Could not confirm archive type. Proceeding cautiously."
          fi

          # Try to list ZIP contents
          if unzip -l "$FILE" > /dev/null 2>&1; then
            echo "  ✅ Archive is readable."
            echo "  Contents:"
            unzip -l "$FILE" | head -20
          else
            echo "::warning::[${{ matrix.id }}] Could not list archive contents. May still be valid."
          fi

      # ── STEP D: Deactivate in target if it exists and is active ──
      - name: "Pre-import: Deactivate in target if active"
        id: pre-import
        run: |
          echo "=========================================="
          echo "  PRE-IMPORT CHECK IN TARGET"
          echo "=========================================="

          TARGET_URL="${{ needs.validate-environment.outputs.target_url }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"

          HTTP=$(curl -s -o /tmp/tgt_check.json -w "%{http_code}" \
            --max-time ${{ env.API_TIMEOUT }} \
            -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
            -H "Accept: application/json" \
            "$${TARGET_URL}/integrations/$${ENCODED}")

          if [ "$HTTP" = "200" ]; then
            STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/tgt_check.json)
            echo "  Integration exists in target. Status: $STATUS"
            echo "exists=true" >> "$GITHUB_OUTPUT"

            if [ "$$STATUS" = "ACTIVATED" ] || [ "$$STATUS" = "ACTIVE" ]; then
              echo "  Deactivating in target..."

              for i in $$(seq 1 $${{ env.MAX_RETRIES }}); do
                D_HTTP=$(curl -s -o /tmp/deact.json -w "%{http_code}" \
                  --max-time ${{ env.API_TIMEOUT }} \
                  -X POST \
                  -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
                  -H "Content-Type: application/json" \
                  -H "Accept: application/json" \
                  -H "X-HTTP-Method-Override: PATCH" \
                  -d '{"status":"CONFIGURED"}' \
                  "$${TARGET_URL}/integrations/$${ENCODED}")

                case "$D_HTTP" in
                  200)
                    echo "  ✅ Deactivated in target."
                    sleep 15
                    break
                    ;;
                  409)
                    echo "::warning::[$${{ matrix.id }}] Deactivation conflict (attempt $$i). Waiting..."
                    sleep 30
                    [ $$i -eq $${{ env.MAX_RETRIES }} ] && {
                      echo "::error::❌ [$${{ matrix.id }}] Could not deactivate in target after $${{ env.MAX_RETRIES }} attempts."
                      cat /tmp/deact.json 2>/dev/null
                      exit 1
                    }
                    ;;
                  401)
                    echo "::error::❌ [${{ matrix.id }}] 401 Unauthorized during deactivation."
                    exit 1
                    ;;
                  *)
                    echo "::error::❌ [$${{ matrix.id }}] Deactivation failed (HTTP $$D_HTTP)."
                    cat /tmp/deact.json 2>/dev/null
                    exit 1
                    ;;
                esac
              done
            else
              echo "  Not active — no deactivation needed."
            fi
          elif [ "$HTTP" = "404" ]; then
            echo "  Integration does not exist in target (fresh import)."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::[$${{ matrix.id }}] Target check returned HTTP $$HTTP. Proceeding."
            echo "exists=unknown" >> "$GITHUB_OUTPUT"
          fi

      # ── STEP E: Import .iar to target ──
      - name: "Import: $${{ matrix.id }} v$${{ matrix.version }} → target"
        id: import
        run: |
          echo "=========================================="
          echo "  IMPORT: $${{ matrix.id }} v$${{ matrix.version }}"
          echo "=========================================="

          TARGET_URL="${{ needs.validate-environment.outputs.target_url }}"
          FILE="${{ steps.export.outputs.export_file }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"
          EXISTS="${{ steps.pre-import.outputs.exists }}"

          SUCCESS=false
          for i in $$(seq 1 $${{ env.MAX_RETRIES }}); do
            echo "  Import attempt $$i/$${{ env.MAX_RETRIES }}..."

            HTTP=$(curl -s -o /tmp/imp.json -w "%{http_code}" \
              --max-time 300 \
              -X PUT \
              -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" \
              -F "file=@${FILE};type=application/octet-stream" \
              "${TARGET_URL}/integrations/archive" 2>/tmp/imp_err.txt)
            EC=$?

            if [ $EC -ne 0 ]; then
              echo "::warning::[$${{ matrix.id }}] Import curl error (attempt $$i): $(cat /tmp/imp_err.txt)"
              [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep ${{ env.RETRY_DELAY }} && continue
              echo "::error::❌ [$${{ matrix.id }}] Import failed — network error after $${{ env.MAX_RETRIES }} attempts."
              exit 1
            fi

            echo "  HTTP: $HTTP"

            case "$HTTP" in
              200|201|204)
                SUCCESS=true
                echo "  ✅ Import succeeded (HTTP $HTTP)."
                break
                ;;
              400)
                echo "::error::❌ [${{ matrix.id }}] Import HTTP 400 Bad Request."
                echo "  Possible causes:"
                echo "    • IAR file is corrupt or incompatible with target OIC version"
                echo "    • Dependent connections/lookups missing in target"
                echo "    • Integration format version mismatch"
                echo "  Response:"
                cat /tmp/imp.json 2>/dev/null
                exit 1
                ;;
              401)
                echo "::error::❌ [${{ matrix.id }}] Import 401 Unauthorized."
                exit 1
                ;;
              403)
                echo "::error::❌ [${{ matrix.id }}] Import 403 Forbidden. User lacks import permission."
                exit 1
                ;;
              409)
                echo "::warning::[${{ matrix.id }}] Import conflict (409). Integration already exists."
                RESP=$(cat /tmp/imp.json 2>/dev/null || echo "")
                echo "  Response: $RESP"

                if [ "$$EXISTS" = "true" ] || echo "$$RESP" | grep -qi "already exists\|duplicate"; then
                  echo "  Deleting existing integration and retrying..."

                  DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                    --max-time ${{ env.API_TIMEOUT }} \
                    -X DELETE \
                    -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
                    "$${TARGET_URL}/integrations/$${ENCODED}")

                  if [ "$$DEL_HTTP" = "204" ] || [ "$$DEL_HTTP" = "200" ]; then
                    echo "  Deleted. Waiting before retry..."
                    sleep 15
                    continue
                  else
                    echo "::error::❌ [$${{ matrix.id }}] Could not delete existing integration (HTTP $$DEL_HTTP)."
                    exit 1
                  fi
                fi

                [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep ${{ env.RETRY_DELAY }} && continue
                echo "::error::❌ [${{ matrix.id }}] Import conflict unresolved."
                exit 1
                ;;
              412)
                echo "::error::❌ [${{ matrix.id }}] Import 412 Precondition Failed. Missing dependencies in target."
                cat /tmp/imp.json 2>/dev/null
                exit 1
                ;;
              413)
                echo "::error::❌ [${{ matrix.id }}] Import 413 Payload Too Large. IAR file exceeds size limit."
                exit 1
                ;;
              500|502|503|504)
                echo "::warning::[$${{ matrix.id }}] Import server error ($$HTTP, attempt $i)."
                [ $$i -lt $${{ env.MAX_RETRIES }} ] && sleep $(( RETRY_DELAY * i )) && continue
                echo "::error::❌ [$${{ matrix.id }}] Import server error after $${{ env.MAX_RETRIES }} attempts."
                cat /tmp/imp.json 2>/dev/null
                exit 1
                ;;
              *)
                echo "::error::❌ [$${{ matrix.id }}] Import unexpected HTTP $$HTTP."
                cat /tmp/imp.json 2>/dev/null
                exit 1
                ;;
            esac
          done

          [ "$$SUCCESS" != "true" ] && { echo "::error::❌ [$${{ matrix.id }}] Import failed."; exit 1; }

      # ── STEP F: Verify integration exists in target after import ──
      - name: "Verify: ${{ matrix.id }} in target"
        run: |
          echo "=========================================="
          echo "  POST-IMPORT VERIFICATION"
          echo "=========================================="

          TARGET_URL="${{ needs.validate-environment.outputs.target_url }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"

          sleep 10
          VERIFIED=false

          for i in $(seq 1 5); do
            echo "  Verify attempt $i/5..."

            HTTP=$(curl -s -o /tmp/verify.json -w "%{http_code}" \
              --max-time ${{ env.API_TIMEOUT }} \
              -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" \
              "$${TARGET_URL}/integrations/$${ENCODED}")

            if [ "$HTTP" = "200" ]; then
              VERIFIED=true
              echo "  ✅ [${{ matrix.id }}] Verified in target."
              jq '{id, name, version, status, pattern}' /tmp/verify.json 2>/dev/null
              break
            fi

            echo "  Not found yet (HTTP $HTTP). Waiting..."
            sleep 15
          done

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::❌ [${{ matrix.id }}] Post-import verification FAILED. Integration not found in target after import."
            exit 1
          fi

      # ── STEP G: Activate in target if it was active in source ──
      - name: "Activate: ${{ matrix.id }} (if was active in source)"
        if: steps.validate-source.outputs.source_status == 'ACTIVATED' || steps.validate-source.outputs.source_status == 'ACTIVE'
        run: |
          echo "=========================================="
          echo "  ACTIVATE: $${{ matrix.id }} v$${{ matrix.version }}"
          echo "=========================================="

          TARGET_URL="${{ needs.validate-environment.outputs.target_url }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED="$${INT_ID}%7C$${INT_VER}"

          # Check if already active
          CUR_HTTP=$(curl -s -o /tmp/act_chk.json -w "%{http_code}" \
            --max-time ${{ env.API_TIMEOUT }} \
            -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
            -H "Accept: application/json" \
            "$${TARGET_URL}/integrations/$${ENCODED}")

          if [ "$CUR_HTTP" = "200" ]; then
            CUR_STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/act_chk.json)
            if [ "$$CUR_STATUS" = "ACTIVATED" ] || [ "$$CUR_STATUS" = "ACTIVE" ]; then
              echo "  ✅ Already active. Skipping."
              exit 0
            fi
          fi

          for i in $$(seq 1 $${{ env.MAX_RETRIES }}); do
            echo "  Activation attempt $$i/$${{ env.MAX_RETRIES }}..."

            A_HTTP=$(curl -s -o /tmp/act.json -w "%{http_code}" \
              --max-time ${{ env.API_TIMEOUT }} \
              -X POST \
              -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "X-HTTP-Method-Override: PATCH" \
              -d '{"status":"ACTIVATED"}' \
              "$${TARGET_URL}/integrations/$${ENCODED}")

            case "$A_HTTP" in
              200)
                echo "  Activation request accepted. Waiting for completion..."
                sleep 30

                # Confirm activation
                for c in $(seq 1 5); do
                  V_HTTP=$(curl -s -o /tmp/act_v.json -w "%{http_code}" \
                    --max-time ${{ env.API_TIMEOUT }} \
                    -u "$${{ secrets.TARGET_OIC_USERNAME }}:$${{ secrets.TARGET_OIC_PASSWORD }}" \
                    -H "Accept: application/json" \
                    "$${TARGET_URL}/integrations/$${ENCODED}")

                  if [ "$V_HTTP" = "200" ]; then
                    V_STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/act_v.json)
                    echo "    Check $$c: status=$$V_STATUS"

                    case "$V_STATUS" in
                      ACTIVATED|ACTIVE)
                        echo "  ✅ [${{ matrix.id }}] ACTIVATED in target."
                        exit 0
                        ;;
                      ACTIVATION_IN_PROGRESS)
                        sleep 20
                        ;;
                      ACTIVATION_FAILED)
                        echo "::error::❌ [${{ matrix.id }}] Activation FAILED in target."
                        jq '.' /tmp/act_v.json 2>/dev/null
                        exit 1
                        ;;
                      *)
                        sleep 15
                        ;;
                    esac
                  fi
                done
                echo "::warning::[${{ matrix.id }}] Activation not confirmed after checks. Please verify manually."
                break
                ;;
              400)
                echo "::error::❌ [${{ matrix.id }}] Activation 400 — possible missing connections/config in target."
                cat /tmp/act.json 2>/dev/null
                exit 1
                ;;
              409)
                echo "::warning::[$${{ matrix.id }}] Activation conflict (attempt $$i). Waiting..."
                sleep 30
                [ $$i -eq $${{ env.MAX_RETRIES }} ] && {
                  echo "::error::❌ [${{ matrix.id }}] Activation conflict not resolved."
                  exit 1
                }
                ;;
              *)
                echo "::error::❌ [$${{ matrix.id }}] Activation HTTP $$A_HTTP."
                cat /tmp/act.json 2>/dev/null
                exit 1
                ;;
            esac
          done

  ##############################################################################
  # JOB 4: SUMMARY REPORT
  ##############################################################################
  summary:
    name: "4 ─ Migration Summary"
    runs-on: ubuntu-latest
    needs: [validate-environment, discover-integrations, migrate-integration]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "=========================================="
          echo "  OIC MIGRATION SUMMARY"
          echo "=========================================="
          echo ""
          echo "  Source:             ${{ secrets.SOURCE_OIC_HOST }}"
          echo "  Target:             ${{ secrets.TARGET_OIC_HOST }}"
          echo "  Integrations found: ${{ needs.discover-integrations.outputs.count }}"
          echo "  Triggered by:       ${{ github.actor }}"
          echo "  Trigger event:      ${{ github.event_name }}"
          echo "  Run:                $${{ github.server_url }}/$${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "  Time:               $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo ""

          VALIDATE="${{ needs.validate-environment.result }}"
          DISCOVER="${{ needs.discover-integrations.result }}"
          MIGRATE="${{ needs.migrate-integration.result }}"

          echo "  Job Results:"
          echo "    Validate Environment: $VALIDATE"
          echo "    Discover:             $DISCOVER"
          echo "    Migrate:              $MIGRATE"
          echo ""

          if [ "$MIGRATE" = "success" ]; then
            echo "  ✅ ALL MIGRATIONS COMPLETED SUCCESSFULLY"
          elif [ "$MIGRATE" = "failure" ]; then
            echo "  ❌ SOME MIGRATIONS FAILED — check individual job logs"
          else
            echo "  ⚠️  Migration status: $MIGRATE"
          fi

      - name: Write GitHub Step Summary
        run: |
          MIGRATE="${{ needs.migrate-integration.result }}"
          if [ "$MIGRATE" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="All Migrations Successful"
          elif [ "$MIGRATE" = "failure" ]; then
            STATUS_ICON="❌"
            STATUS_TEXT="Some Migrations Failed"
          else
            STATUS_ICON="⚠️"
            STATUS_TEXT="Status: $MIGRATE"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## $STATUS_ICON OIC Integration Migration Report

          | Property | Value |
          |----------|-------|
          | **
