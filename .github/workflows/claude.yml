###############################################################################
# FULLY AUTOMATED OIC-to-OIC INTEGRATION MIGRATION
#
# - Discovers integrations in source OIC (paged)
# - Exports each as .iar, imports to target, optional deactivate/activate
# - Retries on transient errors
#
# Auth: HTTP Basic (username + password) against OIC REST API.
#
# Design-time hosts (https://design.integration.<region>.ocp.oraclecloud.com):
#   Set SOURCE_OIC_INSTANCE / TARGET_OIC_INSTANCE to the service instance name
#   (?integrationInstance=... in the browser). Leave blank for service-console
#   hostnames where the instance is in the URL.
#
# Triggers: push to main (config change), schedule, workflow_dispatch
###############################################################################
 
name: "OIC Auto-Migration (Source → Target)"
 
on:
  push:
    branches: [main]
    paths:
      - "config/migration-config.json"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}
 
concurrency:
  group: oic-auto-migration
  cancel-in-progress: false
 
env:
  API_TIMEOUT: 120
  MAX_RETRIES: 3
  RETRY_DELAY: 15
  EXPORT_DIR: "oic_exports"
 
jobs:
  validate-environment:
    name: "1 ─ Validate Environment"
    runs-on: ubuntu-latest
    outputs:
      source_url: ${{ steps.urls.outputs.source_url }}
      target_url: ${{ steps.urls.outputs.target_url }}
      source_instance: ${{ steps.urls.outputs.source_instance }}
      target_instance: ${{ steps.urls.outputs.target_instance }}
 
    steps:
      - name: "Check required secrets"
        run: |
          echo "=========================================="
          echo "  CHECKING REQUIRED SECRETS"
          echo "=========================================="
          FAIL=false
 
          check_secret() {
            local n="$1"
            local v="$2"
            if [ -z "$v" ]; then
              echo "::error::Secret '$n' is NOT configured."
              FAIL=true
            else
              echo "  ✅ $n is set"
            fi
          }
 
          check_secret "SOURCE_OIC_HOST" "${{ secrets.SOURCE_OIC_HOST }}"
          check_secret "SOURCE_OIC_USERNAME" "${{ secrets.SOURCE_OIC_USERNAME }}"
          check_secret "SOURCE_OIC_PASSWORD" "${{ secrets.SOURCE_OIC_PASSWORD }}"
          check_secret "TARGET_OIC_HOST" "${{ secrets.TARGET_OIC_HOST }}"
          check_secret "TARGET_OIC_USERNAME" "${{ secrets.TARGET_OIC_USERNAME }}"
          check_secret "TARGET_OIC_PASSWORD" "${{ secrets.TARGET_OIC_PASSWORD }}"
 
          if [ "$FAIL" = true ]; then
            echo ""
            echo "::error::Add missing secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo ""
          echo "✅ All required secrets present."
          echo "ℹ️  SOURCE_OIC_INSTANCE / TARGET_OIC_INSTANCE are optional (required for design-time URL)."
 
      - name: "Build OIC REST base URLs"
        id: urls
        run: |
          build_url() {
            local host="$1"
            host="${host%/}"
            [[ "$host" != https://* ]] && host="https://${host}"
            echo "${host}/ic/api/integration/v1"
          }
 
          SOURCE_URL=$(build_url "${{ secrets.SOURCE_OIC_HOST }}")
          TARGET_URL=$(build_url "${{ secrets.TARGET_OIC_HOST }}")
 
          echo "Source API: $SOURCE_URL"
          echo "Target API: $TARGET_URL"
 
          echo "source_url=$SOURCE_URL" >> "$GITHUB_OUTPUT"
          echo "target_url=$TARGET_URL" >> "$GITHUB_OUTPUT"
          echo "source_instance=${{ secrets.SOURCE_OIC_INSTANCE }}" >> "$GITHUB_OUTPUT"
          echo "target_instance=${{ secrets.TARGET_OIC_INSTANCE }}" >> "$GITHUB_OUTPUT"
 
      - name: "Check source OIC connectivity"
        env:
          SOURCE_URL: ${{ steps.urls.outputs.source_url }}
          SRC_INST: ${{ steps.urls.outputs.source_instance }}
        run: |
          echo "=========================================="
          echo "  TESTING SOURCE OIC"
          echo "=========================================="
 
          if [ -n "$SRC_INST" ]; then
            URL="${SOURCE_URL}/integrations?integrationInstance=${SRC_INST}&limit=1"
          else
            URL="${SOURCE_URL}/integrations?limit=1"
          fi
 
          for i in $(seq 1 "$MAX_RETRIES"); do
            HTTP=$(curl -s -o /tmp/src.json -w "%{http_code}" \
              --max-time "$API_TIMEOUT" \
              -u "${{ secrets.SOURCE_OIC_USERNAME }}:${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/json" "$URL" 2>/tmp/src_err.txt)
            EC=$?
 
            if [ "$EC" -ne 0 ]; then
              echo "::warning::Curl error (attempt $i): $(cat /tmp/src_err.txt)"
              [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
              echo "::error::Cannot reach source OIC after $MAX_RETRIES attempts."
              exit 1
            fi
 
            case "$HTTP" in
              200) echo "✅ Source OIC reachable."; break ;;
              401) echo "::error::Source returned 401 — check SOURCE_OIC_USERNAME / SOURCE_OIC_PASSWORD."; exit 1 ;;
              403) echo "::error::Source returned 403 — user lacks REST API access."; exit 1 ;;
              404)
                echo "::error::Source returned 404 — check SOURCE_OIC_HOST and SOURCE_OIC_INSTANCE (design-time)."
                exit 1
                ;;
              500|502|503|504)
                echo "::warning::Source returned $HTTP (attempt $i)."
                [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
                echo "::error::Source server error ($HTTP)."
                exit 1
                ;;
              *) echo "::error::Unexpected HTTP $HTTP from source."; cat /tmp/src.json; exit 1 ;;
            esac
          done
 
      - name: "Check target OIC connectivity"
        env:
          TARGET_URL: ${{ steps.urls.outputs.target_url }}
          TGT_INST: ${{ steps.urls.outputs.target_instance }}
        run: |
          echo "=========================================="
          echo "  TESTING TARGET OIC"
          echo "=========================================="
 
          if [ -n "$TGT_INST" ]; then
            URL="${TARGET_URL}/integrations?integrationInstance=${TGT_INST}&limit=1"
          else
            URL="${TARGET_URL}/integrations?limit=1"
          fi
 
          for i in $(seq 1 "$MAX_RETRIES"); do
            HTTP=$(curl -s -o /tmp/tgt.json -w "%{http_code}" \
              --max-time "$API_TIMEOUT" \
              -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" "$URL" 2>/tmp/tgt_err.txt)
            EC=$?
 
            if [ "$EC" -ne 0 ]; then
              echo "::warning::Curl error (attempt $i): $(cat /tmp/tgt_err.txt)"
              [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
              echo "::error::Cannot reach target OIC after $MAX_RETRIES attempts."
              exit 1
            fi
 
            case "$HTTP" in
              200) echo "✅ Target OIC reachable."; break ;;
              401) echo "::error::Target returned 401."; exit 1 ;;
              403) echo "::error::Target returned 403."; exit 1 ;;
              404)
                echo "::error::Target returned 404 — check TARGET_OIC_HOST and TARGET_OIC_INSTANCE."
                exit 1
                ;;
              500|502|503|504)
                echo "::warning::Target returned $HTTP (attempt $i)."
                [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
                echo "::error::Target server error ($HTTP)."
                exit 1
                ;;
              *) echo "::error::Unexpected HTTP $HTTP from target."; cat /tmp/tgt.json; exit 1 ;;
            esac
          done
 
  discover-integrations:
    name: "2 ─ Discover Source Integrations"
    runs-on: ubuntu-latest
    needs: validate-environment
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      count: ${{ steps.build-matrix.outputs.count }}
 
    steps:
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
 
      - name: "Fetch integrations (paged)"
        id: build-matrix
        env:
          SOURCE_URL: ${{ needs.validate-environment.outputs.source_url }}
          SRC_INST: ${{ needs.validate-environment.outputs.source_instance }}
        run: |
          echo "=========================================="
          echo "  DISCOVERING INTEGRATIONS"
          echo "=========================================="
 
          ALL='[]'
          OFFSET=0
          LIMIT=100
          PAGE=1
 
          while true; do
            echo "Fetching page $PAGE (offset=$OFFSET)..."
 
            if [ -n "$SRC_INST" ]; then
              LIST_URL="${SOURCE_URL}/integrations?integrationInstance=${SRC_INST}&limit=${LIMIT}&offset=${OFFSET}"
            else
              LIST_URL="${SOURCE_URL}/integrations?limit=${LIMIT}&offset=${OFFSET}"
            fi
 
            HTTP=$(curl -s -o /tmp/page.json -w "%{http_code}" \
              --max-time "$API_TIMEOUT" \
              -u "${{ secrets.SOURCE_OIC_USERNAME }}:${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/json" \
              "$LIST_URL" 2>/tmp/page_err.txt)
            EC=$?
 
            if [ "$EC" -ne 0 ]; then
              echo "::error::Curl failed page $PAGE: $(cat /tmp/page_err.txt)"
              exit 1
            fi
 
            if [ "$HTTP" != "200" ]; then
              echo "::error::List failed HTTP $HTTP page $PAGE"
              cat /tmp/page.json 2>/dev/null || true
              exit 1
            fi
 
            if ! jq empty /tmp/page.json 2>/dev/null; then
              echo "::error::Invalid JSON on page $PAGE"
              head -c 500 /tmp/page.json
              exit 1
            fi
 
            ITEMS=$(jq -c '.items // []' /tmp/page.json)
            ITEM_COUNT=$(echo "$ITEMS" | jq 'length')
            echo "  Page $PAGE: $ITEM_COUNT items"
 
            PAGE_ENTRIES=$(echo "$ITEMS" | jq -c '[.[] | {
              id: (.id // .code // .identifier),
              version: .version,
              name: (.name // "unknown"),
              status: (.status // "UNKNOWN")
            }]')
 
            ALL=$(jq -s '.[0] + .[1]' <(echo "$ALL") <(echo "$PAGE_ENTRIES"))
 
            if [ "$ITEM_COUNT" -lt "$LIMIT" ]; then
              break
            fi
            OFFSET=$((OFFSET + LIMIT))
            PAGE=$((PAGE + 1))
          done
 
          TOTAL=$(echo "$ALL" | jq 'length')
          echo ""
          echo "TOTAL INTEGRATIONS: $TOTAL"
 
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No integrations found in source."
            exit 1
          fi
 
          echo "$ALL" | jq -r '.[] | "  [\(.status)] \(.id) v\(.version) — \(.name)"'
 
          MATRIX=$(echo "$ALL" | jq -c '{include: .}')
          echo "count=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
 
  migrate-integration:
    name: "3 — ${{ matrix.id }} v${{ matrix.version }}"
    runs-on: ubuntu-latest
    needs: [validate-environment, discover-integrations]
    strategy:
      matrix: ${{ fromJson(needs.discover-integrations.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3
 
    steps:
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl file unzip
 
      - name: "Validate source"
        id: validate-source
        env:
          SOURCE_URL: ${{ needs.validate-environment.outputs.source_url }}
          SRC_INST: ${{ needs.validate-environment.outputs.source_instance }}
        run: |
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
 
          if [ -n "$SRC_INST" ]; then
            VURL="${SOURCE_URL}/integrations/${ENCODED}?integrationInstance=${SRC_INST}"
          else
            VURL="${SOURCE_URL}/integrations/${ENCODED}"
          fi
 
          HTTP=$(curl -s -o /tmp/val_src.json -w "%{http_code}" \
            --max-time "$API_TIMEOUT" \
            -u "${{ secrets.SOURCE_OIC_USERNAME }}:${{ secrets.SOURCE_OIC_PASSWORD }}" \
            -H "Accept: application/json" "$VURL")
 
          case "$HTTP" in
            200)
              echo "✅ Found in source."
              SRC_STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/val_src.json)
              echo "source_status=$SRC_STATUS" >> "$GITHUB_OUTPUT"
              ;;
            404) echo "::error::Not found in source: $INT_ID"; exit 1 ;;
            401) echo "::error::401 validating source"; exit 1 ;;
            *) echo "::error::HTTP $HTTP validating source"; cat /tmp/val_src.json; exit 1 ;;
          esac
 
      - name: "Export .iar"
        id: export
        env:
          SOURCE_URL: ${{ needs.validate-environment.outputs.source_url }}
          SRC_INST: ${{ needs.validate-environment.outputs.source_instance }}
        run: |
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
          mkdir -p "$EXPORT_DIR"
          FILE="${EXPORT_DIR}/${INT_ID}_${INT_VER}.iar"
 
          SUCCESS=false
          for i in $(seq 1 "$MAX_RETRIES"); do
            if [ -n "$SRC_INST" ]; then
              EURL="${SOURCE_URL}/integrations/${ENCODED}/archive?integrationInstance=${SRC_INST}"
            else
              EURL="${SOURCE_URL}/integrations/${ENCODED}/archive"
            fi
 
            HTTP=$(curl -s -L -o "$FILE" -w "%{http_code}" \
              --max-time 300 \
              -u "${{ secrets.SOURCE_OIC_USERNAME }}:${{ secrets.SOURCE_OIC_PASSWORD }}" \
              -H "Accept: application/octet-stream" \
              "$EURL" 2>/tmp/exp_err.txt)
            EC=$?
 
            if [ "$EC" -ne 0 ]; then
              echo "::warning::Export curl error (attempt $i): $(cat /tmp/exp_err.txt)"
              [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
              exit 1
            fi
 
            case "$HTTP" in
              200) SUCCESS=true; break ;;
              409)
                echo "::warning::409 conflict, retrying..."
                [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
                exit 1
                ;;
              500|502|503|504)
                [ "$i" -lt "$MAX_RETRIES" ] && sleep $((RETRY_DELAY * i)) && continue
                exit 1
                ;;
              *) echo "::error::Export HTTP $HTTP"; head -c 800 "$FILE"; exit 1 ;;
            esac
          done
 
          [ "$SUCCESS" = true ] || exit 1
          echo "export_file=$FILE" >> "$GITHUB_OUTPUT"
 
      - name: "Validate export file"
        run: |
          FILE="${{ steps.export.outputs.export_file }}"
          [ -f "$FILE" ] || { echo "::error::Missing export file"; exit 1; }
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
          echo "Size: $SIZE bytes"
          [ "$SIZE" -ge 100 ] || { echo "::error::File too small"; cat "$FILE"; exit 1; }
          TYPE=$(file "$FILE")
          echo "$TYPE"
          if echo "$TYPE" | grep -qiE "text|json|xml|html"; then
            echo "::error::Response is not a binary archive"
            head -c 500 "$FILE"
            exit 1
          fi
 
      - name: "Pre-import: deactivate in target if active"
        id: pre-import
        env:
          TARGET_URL: ${{ needs.validate-environment.outputs.target_url }}
          TGT_INST: ${{ needs.validate-environment.outputs.target_instance }}
        run: |
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
 
          if [ -n "$TGT_INST" ]; then
            GURL="${TARGET_URL}/integrations/${ENCODED}?integrationInstance=${TGT_INST}"
          else
            GURL="${TARGET_URL}/integrations/${ENCODED}"
          fi
 
          HTTP=$(curl -s -o /tmp/tgt_check.json -w "%{http_code}" \
            --max-time "$API_TIMEOUT" \
            -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
            -H "Accept: application/json" "$GURL")
 
          if [ "$HTTP" = "200" ]; then
            STATUS=$(jq -r '.status // "UNKNOWN"' /tmp/tgt_check.json)
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ "$STATUS" = "ACTIVATED" ] || [ "$STATUS" = "ACTIVE" ]; then
              for i in $(seq 1 "$MAX_RETRIES"); do
                if [ -n "$TGT_INST" ]; then
                  PURL="${TARGET_URL}/integrations/${ENCODED}?integrationInstance=${TGT_INST}"
                else
                  PURL="${TARGET_URL}/integrations/${ENCODED}"
                fi
                D_HTTP=$(curl -s -o /tmp/deact.json -w "%{http_code}" \
                  --max-time "$API_TIMEOUT" \
                  -X POST \
                  -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
                  -H "Content-Type: application/json" \
                  -H "Accept: application/json" \
                  -H "X-HTTP-Method-Override: PATCH" \
                  -d '{"status":"CONFIGURED"}' \
                  "$PURL")
                case "$D_HTTP" in
                  200) sleep 15; break ;;
                  409) sleep 30; [ "$i" -eq "$MAX_RETRIES" ] && exit 1 ;;
                  *) cat /tmp/deact.json; exit 1 ;;
                esac
              done
            fi
          elif [ "$HTTP" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=unknown" >> "$GITHUB_OUTPUT"
          fi
 
      - name: "Import to target"
        id: import
        env:
          TARGET_URL: ${{ needs.validate-environment.outputs.target_url }}
          TGT_INST: ${{ needs.validate-environment.outputs.target_instance }}
        run: |
          FILE="${{ steps.export.outputs.export_file }}"
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
          EXISTS="${{ steps.pre-import.outputs.exists }}"
 
          if [ -n "$TGT_INST" ]; then
            IURL="${TARGET_URL}/integrations/archive?integrationInstance=${TGT_INST}"
          else
            IURL="${TARGET_URL}/integrations/archive"
          fi
 
          SUCCESS=false
          for i in $(seq 1 "$MAX_RETRIES"); do
            HTTP=$(curl -s -o /tmp/imp.json -w "%{http_code}" \
              --max-time 300 \
              -X POST \
              -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" \
              -F "file=@${FILE};type=application/octet-stream" \
              "$IURL" 2>/tmp/imp_err.txt)
            EC=$?
 
            if [ "$EC" -ne 0 ]; then
              echo "::warning::Import curl error: $(cat /tmp/imp_err.txt)"
              [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
              exit 1
            fi
 
            case "$HTTP" in
              200|201|204) SUCCESS=true; break ;;
              409)
                RESP=$(cat /tmp/imp.json 2>/dev/null || true)
                if [ "$EXISTS" = "true" ] || echo "$RESP" | grep -qi "already exists\|duplicate"; then
                  if [ -n "$TGT_INST" ]; then
                    DEL_URL="${TARGET_URL}/integrations/${ENCODED}?integrationInstance=${TGT_INST}"
                  else
                    DEL_URL="${TARGET_URL}/integrations/${ENCODED}"
                  fi
                  DEL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                    --max-time "$API_TIMEOUT" \
                    -X DELETE \
                    -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
                    "$DEL_URL")
                  if [ "$DEL_HTTP" = "204" ] || [ "$DEL_HTTP" = "200" ]; then
                    sleep 15
                    continue
                  fi
                fi
                [ "$i" -lt "$MAX_RETRIES" ] && sleep "$RETRY_DELAY" && continue
                cat /tmp/imp.json 2>/dev/null
                exit 1
                ;;
              400|401|403|412|413) cat /tmp/imp.json 2>/dev/null; exit 1 ;;
              500|502|503|504)
                [ "$i" -lt "$MAX_RETRIES" ] && sleep $((RETRY_DELAY * i)) && continue
                exit 1
                ;;
              *) cat /tmp/imp.json 2>/dev/null; exit 1 ;;
            esac
          done
 
          [ "$SUCCESS" = true ] || exit 1
 
      - name: "Verify in target"
        env:
          TARGET_URL: ${{ needs.validate-environment.outputs.target_url }}
          TGT_INST: ${{ needs.validate-environment.outputs.target_instance }}
        run: |
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
          sleep 10
          for i in $(seq 1 5); do
            if [ -n "$TGT_INST" ]; then
              VURL="${TARGET_URL}/integrations/${ENCODED}?integrationInstance=${TGT_INST}"
            else
              VURL="${TARGET_URL}/integrations/${ENCODED}"
            fi
            HTTP=$(curl -s -o /tmp/verify.json -w "%{http_code}" \
              --max-time "$API_TIMEOUT" \
              -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Accept: application/json" "$VURL")
            if [ "$HTTP" = "200" ]; then
              jq '{id, name, version, status, pattern}' /tmp/verify.json 2>/dev/null || true
              exit 0
            fi
            sleep 15
          done
          echo "::error::Post-import verification failed"
          exit 1
 
      - name: "Activate in target (if active in source)"
        if: ${{ steps.validate-source.outputs.source_status == 'ACTIVATED' || steps.validate-source.outputs.source_status == 'ACTIVE' }}
        env:
          TARGET_URL: ${{ needs.validate-environment.outputs.target_url }}
          TGT_INST: ${{ needs.validate-environment.outputs.target_instance }}
        run: |
          INT_ID="${{ matrix.id }}"
          INT_VER="${{ matrix.version }}"
          ENCODED=$(python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1]+"|"+sys.argv[2], safe=""))' "$INT_ID" "$INT_VER")
 
          if [ -n "$TGT_INST" ]; then
            AURL="${TARGET_URL}/integrations/${ENCODED}?integrationInstance=${TGT_INST}"
          else
            AURL="${TARGET_URL}/integrations/${ENCODED}"
          fi
 
          CUR=$(curl -s -o /tmp/act_chk.json -w "%{http_code}" \
            --max-time "$API_TIMEOUT" \
            -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
            -H "Accept: application/json" "$AURL")
          if [ "$CUR" = "200" ]; then
            ST=$(jq -r '.status // ""' /tmp/act_chk.json)
            if [ "$ST" = "ACTIVATED" ] || [ "$ST" = "ACTIVE" ]; then
              echo "Already active."
              exit 0
            fi
          fi
 
          for i in $(seq 1 "$MAX_RETRIES"); do
            A_HTTP=$(curl -s -o /tmp/act.json -w "%{http_code}" \
              --max-time "$API_TIMEOUT" \
              -X POST \
              -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "X-HTTP-Method-Override: PATCH" \
              -d '{"status":"ACTIVATED"}' \
              "$AURL")
            case "$A_HTTP" in
              200)
                sleep 30
                for c in $(seq 1 5); do
                  V_HTTP=$(curl -s -o /tmp/act_v.json -w "%{http_code}" \
                    --max-time "$API_TIMEOUT" \
                    -u "${{ secrets.TARGET_OIC_USERNAME }}:${{ secrets.TARGET_OIC_PASSWORD }}" \
                    -H "Accept: application/json" "$AURL")
                  if [ "$V_HTTP" = "200" ]; then
                    VS=$(jq -r '.status // ""' /tmp/act_v.json)
                    case "$VS" in
                      ACTIVATED|ACTIVE) echo "Activated."; exit 0 ;;
                      ACTIVATION_FAILED) jq '.' /tmp/act_v.json; exit 1 ;;
                    esac
                  fi
                  sleep 20
                done
                exit 0
                ;;
              409) sleep 30; [ "$i" -eq "$MAX_RETRIES" ] && exit 1 ;;
              *) cat /tmp/act.json; exit 1 ;;
            esac
          done
 
  summary:
    name: "4 ─ Migration Summary"
    runs-on: ubuntu-latest
    needs: [validate-environment, discover-integrations, migrate-integration]
    if: always()
 
    steps:
      - name: Report
        run: |
          echo "=========================================="
          echo "  OIC MIGRATION SUMMARY"
          echo "=========================================="
          echo "  Source host:        ${{ secrets.SOURCE_OIC_HOST }}"
          echo "  Target host:        ${{ secrets.TARGET_OIC_HOST }}"
          echo "  Integrations found: ${{ needs.discover-integrations.outputs.count }}"
          echo "  Actor:              ${{ github.actor }}"
          echo "  Event:              ${{ github.event_name }}"
          echo "  Run:                ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "  Time (UTC):         $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo ""
          echo "  Validate:  ${{ needs.validate-environment.result }}"
          echo "  Discover:  ${{ needs.discover-integrations.result }}"
          echo "  Migrate:   ${{ needs.migrate-integration.result }}"
 
      - name: GitHub Step Summary
        run: |
          M="${{ needs.migrate-integration.result }}"
          case "$M" in
            success) ICON="✅"; TXT="All matrix jobs succeeded" ;;
            failure) ICON="❌"; TXT="One or more matrix jobs failed — inspect logs" ;;
            *) ICON="⚠️"; TXT="Migrate result: $M" ;;
          esac
          {
            echo "## ${ICON} OIC migration"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | **${TXT}** |"
            echo "| Integrations discovered | ${{ needs.discover-integrations.outputs.count }} |"
            echo "| Validate job | ${{ needs.validate-environment.result }} |"
            echo "| Discover job | ${{ needs.discover-integrations.result }} |"
            echo "| Migrate job | ${{ needs.migrate-integration.result }} |"
            echo "| Run | [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
