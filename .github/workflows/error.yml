name: DEBUG

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test 1 - No scope
        env:
          CID: ${{ secrets.OIC_CLIENT_ID }}
          CSC: ${{ secrets.OIC_CLIENT_SECRET }}
          IDC: ${{ secrets.IDCS_URL }}
        run: |
          echo "=== TEST 1 NO SCOPE ==="
          curl -s -X POST \
            -u "${CID}:${CSC}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${IDC}/oauth2/v1/token" | jq '.'

      - name: Test 2 - With scope
        env:
          CID: ${{ secrets.OIC_CLIENT_ID }}
          CSC: ${{ secrets.OIC_CLIENT_SECRET }}
          IDC: ${{ secrets.IDCS_URL }}
          SCP: ${{ secrets.OIC_SCOPE }}
        run: |
          echo "=== TEST 2 WITH SCOPE ==="
          curl -s -X POST \
            -u "${CID}:${CSC}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "scope=${SCP}" \
            "${IDC}/oauth2/v1/token" | jq '.'

      - name: Test 3 - Basic auth on OIC
        env:
          CID: ${{ secrets.OIC_CLIENT_ID }}
          CSC: ${{ secrets.OIC_CLIENT_SECRET }}
          OIC: ${{ secrets.OIC_GEN3_HOST }}
        run: |
          echo "=== TEST 3 BASIC AUTH ON OIC ==="
          curl -s -L -X GET \
            -u "${CID}:${CSC}" \
            -H "Accept: application/json" \
            "${OIC}/ic/api/integration/v1/integrations?limit=1" | jq '.'

      - name: Test 4 - Secret lengths
        env:
          V1: ${{ secrets.OIC_GEN3_HOST }}
          V2: ${{ secrets.IDCS_URL }}
          V3: ${{ secrets.OIC_CLIENT_ID }}
          V4: ${{ secrets.OIC_CLIENT_SECRET }}
          V5: ${{ secrets.OIC_SCOPE }}
        run: |
          echo "=== SECRET LENGTHS ==="
          echo "OIC_GEN3_HOST: ${#V1}"
          echo "IDCS_URL: ${#V2}"
          echo "CLIENT_ID: ${#V3}"
          echo "CLIENT_SECRET: ${#V4}"
          echo "OIC_SCOPE: ${#V5}"
          echo ""
          echo "=== HIDDEN CHARS ==="
          printf "OIC_HOST: [%s]\n" "$V1" | cat -A
          printf "IDCS_URL: [%s]\n" "$V2" | cat -A
          printf "SCOPE: [%s]\n" "$V5" | cat -A
